name: Build and Release

on:
  push:
    tags:
      - 'release/v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/release/v}
          npm version $VERSION --no-git-tag-version --allow-same-version
        shell: bash

      - name: Upscale icon
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $src = [System.Drawing.Image]::FromFile("$PWD\build\icon.png")
          $bmp = New-Object System.Drawing.Bitmap(1024, 1024)
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
          $g.DrawImage($src, 0, 0, 1024, 1024)
          $src.Dispose(); $g.Dispose()
          $bmp.Save("$PWD\build\icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
          $bmp.Dispose()

      - name: Build for Windows
        run: npm run package -- --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/windows-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
